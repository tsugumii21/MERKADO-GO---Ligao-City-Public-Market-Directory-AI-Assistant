name: merkado_go
description: "MERKADO GO - Ligao City Public Market Directory & AI Assistant"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Google Services
  google_generative_ai: ^0.4.6
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2

  # Image Handling
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1
  cloudinary_public: ^0.23.1

  # HTTP & API
  http: ^1.2.2

  # Permissions
  permission_handler: ^11.3.1

  # Environment Variables
  flutter_dotenv: ^5.2.1

  # Local Storage
  shared_preferences: ^2.3.3

  # Utilities
  intl: ^0.20.0
  flutter_markdown: ^0.7.3
  google_fonts: ^6.2.1
  lottie: ^3.1.3
  timeago: ^3.7.0
  uuid: ^4.5.1

  # Cupertino Icons (for Android icons fallback)
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  json_serializable: ^6.9.2

  # Linting
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - .env
    - assets/images/
    - assets/animations/
    - assets/icons/

  # Fonts (optional - add custom fonts here later if needed)
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700
